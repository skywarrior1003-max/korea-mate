name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 12 */3 * *'  # 3일마다 낮 12시 UTC 실행
  workflow_dispatch:          # 수동 실행 가능

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase city_spots
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "https://tfulaxxtorbxhlgupktc.supabase.co/rest/v1/city_spots?select=id&limit=1")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Keep-alive ping failed (status: $STATUS)"
            exit 1
          fi
          echo "Supabase keep-alive ping successful"
